@if (dialogService.isOpen()) {
  <div class="overlay" (click)="dialogService.cancel()">
    <div class="dialog" (click)="$event.stopPropagation()">
      <div class="dialog-header">
        <h3>{{ dialogService.config().title }}</h3>
      </div>
      <div class="dialog-body">
        <p>{{ dialogService.config().message }}</p>
      </div>
      <div class="dialog-actions">
        <button class="btn btn-secondary" (click)="dialogService.cancel()">
          {{ dialogService.config().cancelText }}
        </button>
        <button
          class="btn"
          [class.btn-danger]="dialogService.config().danger"
          [class.btn-primary]="!dialogService.config().danger"
          (click)="dialogService.confirm()">
          {{ dialogService.config().confirmText }}
        </button>
      </div>
    </div>
  </div>
}
